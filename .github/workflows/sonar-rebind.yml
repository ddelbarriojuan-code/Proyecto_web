name: SonarCloud Re-bind Repository

on:
  workflow_dispatch:

jobs:
  rebind:
    name: Update GitHub binding in SonarCloud
    runs-on: ubuntu-latest
    steps:
      - name: Debug - get binding and list ALM settings
        id: get_binding
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          echo "=== get_binding ==="
          curl -s -w "\nHTTP:%{http_code}" -u "$SONAR_TOKEN:" \
            "https://sonarcloud.io/api/alm_settings/get_binding?project=ddelbarriojuan-code_Proyecto_web"
          echo ""
          echo "=== list_definitions (org) ==="
          curl -s -w "\nHTTP:%{http_code}" -u "$SONAR_TOKEN:" \
            "https://sonarcloud.io/api/alm_settings/list_definitions?organization=ddelbarriojuan-code"
          echo ""
          echo "=== list (project) ==="
          curl -s -w "\nHTTP:%{http_code}" -u "$SONAR_TOKEN:" \
            "https://sonarcloud.io/api/alm_settings/list?project=ddelbarriojuan-code_Proyecto_web"

      - name: Try update binding directly
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          echo "=== Attempting set_github_binding ==="
          # Try with common almSetting key formats
          for ALM_KEY in "GitHub" "github" "ddelbarriojuan-code" "DariodelBarrio"; do
            echo "Trying almSetting=$ALM_KEY"
            RES=$(curl -s -w "\nHTTP:%{http_code}" -u "$SONAR_TOKEN:" -X POST \
              "https://sonarcloud.io/api/alm_settings/set_github_binding" \
              --data-urlencode "project=ddelbarriojuan-code_Proyecto_web" \
              --data-urlencode "almSetting=$ALM_KEY" \
              --data-urlencode "repository=DariodelBarrio/Proyecto_web" \
              --data-urlencode "summaryCommentEnabled=true")
            echo "$RES"
            HTTP=$(echo "$RES" | grep "HTTP:" | tail -1 | cut -d: -f2)
            if [ "$HTTP" = "204" ] || [ "$HTTP" = "200" ]; then
              echo "✅ Success with almSetting=$ALM_KEY"
              exit 0
            fi
          done
          echo "All attempts failed — token may lack admin permissions"
          exit 1
