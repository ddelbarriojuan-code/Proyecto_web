name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# ──────────────────────────────────────────────────────────────────
# SECRET SCAN
# ──────────────────────────────────────────────────────────────────
jobs:
  secret-scan:
    name: Gitleaks — escaneo de secrets
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Gitleaks scan
        id: gitleaks
        uses: gitleaks/gitleaks-action@v2
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_REPORT: gitleaks-report.json

      - name: Job Summary
        if: always()
        run: |
          if [ "${{ steps.gitleaks.outcome }}" = "success" ]; then
            echo "## ✅ Secret Scan — No se han detectado credenciales expuestas" >> $GITHUB_STEP_SUMMARY
          else
            echo "## ❌ Secret Scan — Se han encontrado secrets en el repositorio" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            if [ -f gitleaks-report.json ]; then
              echo "| Archivo | Línea | Regla |" >> $GITHUB_STEP_SUMMARY
              echo "|---------|-------|-------|" >> $GITHUB_STEP_SUMMARY
              jq -r '.[] | "| \(.File) | \(.StartLine) | \(.RuleID) |"' gitleaks-report.json >> $GITHUB_STEP_SUMMARY
            fi
          fi

      - name: Fail if secrets found
        if: steps.gitleaks.outcome != 'success'
        run: exit 1

# ──────────────────────────────────────────────────────────────────
# FRONTEND
# ──────────────────────────────────────────────────────────────────
  test-frontend:
    name: Frontend — typecheck + tests + coverage
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-node@v6.3.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Tests + coverage
        id: test
        run: npm run test:coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage/
          retention-days: 1

      - name: Job Summary
        if: always()
        run: |
          STATUS="${{ steps.test.outcome }}"
          if [ "$STATUS" = "success" ]; then
            echo "## ✅ Frontend — tests y cobertura OK" >> $GITHUB_STEP_SUMMARY
          else
            echo "## ❌ Frontend — tests o cobertura fallaron" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          node $GITHUB_WORKSPACE/.github/scripts/coverage-summary.js \
            coverage/coverage-summary.json \
            "Frontend" \
            "$STATUS" >> $GITHUB_STEP_SUMMARY

# ──────────────────────────────────────────────────────────────────
# BACKEND
# ──────────────────────────────────────────────────────────────────
  test-backend:
    name: Backend — typecheck + tests + coverage
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-node@v6.3.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Tests + coverage
        id: test
        run: npm run test:coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage/
          retention-days: 1

      - name: Job Summary
        if: always()
        run: |
          STATUS="${{ steps.test.outcome }}"
          if [ "$STATUS" = "success" ]; then
            echo "## ✅ Backend — tests y cobertura OK" >> $GITHUB_STEP_SUMMARY
          else
            echo "## ❌ Backend — tests o cobertura fallaron" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          node $GITHUB_WORKSPACE/.github/scripts/coverage-summary.js \
            coverage/coverage-summary.json \
            "Backend" \
            "$STATUS" >> $GITHUB_STEP_SUMMARY

# ──────────────────────────────────────────────────────────────────
# SONARCLOUD
# ──────────────────────────────────────────────────────────────────
  quality:
    name: SonarCloud — análisis de calidad
    runs-on: ubuntu-latest
    needs: [test-frontend, test-backend]
    if: always()

    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Download frontend coverage
        uses: actions/download-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage/
        continue-on-error: true

      - name: Download backend coverage
        uses: actions/download-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage/
        continue-on-error: true

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Job Summary
        if: always()
        run: |
          echo "## 🔍 SonarCloud — Análisis de calidad" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Ver resultados completos en el dashboard:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "👉 [sonarcloud.io/project/overview?id=ddelbarriojuan-code_Proyecto_web](https://sonarcloud.io/project/overview?id=ddelbarriojuan-code_Proyecto_web)" >> $GITHUB_STEP_SUMMARY
